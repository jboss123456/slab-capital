<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>SLAB TRACK</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#04070a">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="Slab Track">

<link rel="apple-touch-icon" href="icon-180.png">

<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>

  :root{--bg:#04070a;--panel:#0a1015;--panel2:#0d1620;--line:#152230;--green:#28f5a8;--green-dim:#0f7a55;--red:#ff5d6c;--amber:#ffcb52;--text:#e2edf2;--mute:#5d7682;--cyan:#3fe0ff;--glow:0 0 26px rgba(40,245,168,.4)}

  *{margin:0;padding:0;box-sizing:border-box}

  html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased}

  body{min-height:100vh;padding:max(20px,env(safe-area-inset-top)) 14px 24px;position:relative;overflow-x:hidden;background-image:radial-gradient(circle at 15% -5%, rgba(40,245,168,.10), transparent 42%),radial-gradient(circle at 95% 8%, rgba(63,224,255,.06), transparent 38%),linear-gradient(rgba(21,34,48,.45) 1px, transparent 1px),linear-gradient(90deg, rgba(21,34,48,.45) 1px, transparent 1px);background-size:auto,auto,38px 38px,38px 38px}

  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:30;background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}

  .wrap{max-width:530px;margin:0 auto;position:relative;z-index:1}

  .head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}

  .logo{font-family:'Chakra Petch',sans-serif;font-weight:700;letter-spacing:1.5px;font-size:21px;display:flex;align-items:center;gap:8px}

  .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:var(--glow);animation:pulse 1.8s infinite}

  .sub{color:var(--mute);font-size:9.5px;letter-spacing:3px;margin-top:5px}

  .clock{text-align:right;font-size:9.5px;color:var(--mute);letter-spacing:1.5px}

  .clock .live{color:var(--green);font-weight:600;display:flex;align-items:center;gap:5px;justify-content:flex-end}

  .clock .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:var(--glow);animation:pulse 1.4s infinite}

  .tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:16px}

  .tabs button{flex:1;background:none;border:none;color:var(--mute);font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;padding:9px 4px;border-radius:8px;cursor:pointer;transition:.15s}

  .tabs button.on{background:linear-gradient(160deg,#10391f,#0a2417);color:var(--green);box-shadow:inset 0 0 0 1px rgba(40,245,168,.3)}

  .view{display:none}

  .view.on{display:block;animation:rise .35s}

  .total{position:relative;border:1px solid var(--line);border-radius:16px;background:linear-gradient(155deg,var(--panel2),var(--panel) 70%);padding:22px 22px 20px;overflow:hidden;margin-bottom:18px;box-shadow:0 0 0 1px rgba(40,245,168,.05),0 24px 50px -30px #000}

  .total::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 88% -15%, rgba(40,245,168,.16), transparent 52%);pointer-events:none}

  .lab{font-size:9.5px;letter-spacing:3.5px;color:var(--mute)}

  .val{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:50px;line-height:1;margin:8px 0 4px;letter-spacing:-1px;text-shadow:0 0 38px rgba(40,245,168,.3)}

  .val .cur{font-size:20px;color:var(--mute);vertical-align:super;margin-right:3px;text-shadow:none}

  .row{display:flex;gap:10px;align-items:center;font-size:12.5px;font-weight:600;flex-wrap:wrap}

  .pill{border-radius:7px;padding:4px 9px}

  .pill.g{background:rgba(40,245,168,.12);border:1px solid rgba(40,245,168,.32);color:var(--green)}

  .pill.r{background:rgba(255,93,108,.12);border:1px solid rgba(255,93,108,.32);color:var(--red)}

  .day{color:var(--mute)}

  .cost{font-size:9.5px;color:var(--mute);margin-top:13px;letter-spacing:1.5px;border-top:1px solid var(--line);padding-top:12px}

  .sectionlab{font-size:9.5px;letter-spacing:3.5px;color:var(--mute);margin:0 4px 10px;display:flex;justify-content:space-between}

  .pos{border:1px solid var(--line);border-radius:14px;background:linear-gradient(165deg,var(--panel),#080d12);padding:16px 17px;margin-bottom:12px;position:relative;overflow:hidden}

  .pos .accent{position:absolute;left:0;top:0;bottom:0;width:3px}

  .pos .glow{position:absolute;right:-20px;top:-30px;width:130px;height:130px;border-radius:50%;pointer-events:none;opacity:.4}

  .top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;gap:10px}

  .lft{min-width:0;flex:1}

  .tkr{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:17px;letter-spacing:.4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;line-height:1.2}

  .badge{font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}

  .name{font-size:9.5px;color:var(--mute);letter-spacing:.5px;margin-top:5px;line-height:1.45}

  .ret{text-align:right;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;line-height:1;white-space:nowrap}

  .ret .x{font-size:9.5px;color:var(--mute);display:block;margin-top:4px;font-family:'IBM Plex Mono';font-weight:500}

  .mid{display:flex;align-items:flex-end;gap:14px;margin-top:10px}

  .spark{flex:1;min-width:0}

  .figs{display:flex;gap:16px;text-align:right}

  .fig .k{font-size:7.5px;color:var(--mute);letter-spacing:1.5px}

  .fig .v{font-size:13px;font-weight:600;margin-top:3px}

  .fig .v.now{color:var(--text)}

  .alloc{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px 17px;margin-top:6px}

  .alloc .k{font-size:9.5px;letter-spacing:3px;color:var(--mute);margin-bottom:12px}

  .bar{display:flex;height:14px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}

  .bar span{height:100%}

  .legend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-top:12px;font-size:9px;color:var(--mute)}

  .legend div{display:flex;align-items:center;gap:5px}

  .sw{width:8px;height:8px;border-radius:2px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

  .stat{border:1px solid var(--line);border-radius:14px;background:linear-gradient(165deg,var(--panel),#080d12);padding:16px}

  .stat .k{font-size:9px;letter-spacing:2px;color:var(--mute)}

  .stat .v{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:24px;margin-top:8px;line-height:1}

  .stat .v.sm{font-size:17px}

  .chartbox{border:1px solid var(--line);border-radius:16px;background:linear-gradient(155deg,var(--panel2),var(--panel) 70%);padding:20px 18px}

  .chartbox .note{font-size:10px;color:var(--mute);line-height:1.6;text-align:center;padding:24px 8px}

  .disc{text-align:center;font-size:8px;color:#2c3d46;letter-spacing:1.2px;margin-top:18px;line-height:1.6}

  .loading{text-align:center;color:var(--mute);padding:50px 0;font-size:11px;letter-spacing:2px}

  .sheet{position:fixed;inset:0;z-index:50;background:rgba(2,5,8,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}

  .sheet.on{display:flex;animation:fade .2s}

  .sheetcard{width:100%;max-width:530px;background:linear-gradient(155deg,var(--panel2),var(--panel) 70%);border:1px solid var(--line);border-top-left-radius:20px;border-top-right-radius:20px;padding:22px 20px calc(28px + env(safe-area-inset-bottom));position:relative;animation:slideup .28s;box-shadow:0 -20px 60px -20px #000}

  .sheetclose{position:absolute;top:15px;right:16px;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--mute);font-size:16px;cursor:pointer;line-height:1;padding:0}

  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  @keyframes fade{from{opacity:0}to{opacity:1}}

  @keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}

</style>

</head>

<body>

<div class="wrap">

  <div class="head">

    <div><div class="logo"><span class="dot"></span>SLAB TRACK</div><div class="sub">GRADED CARD INDEX &middot; JORDAN</div></div>

    <div class="clock"><div class="live">LIVE</div><div id="updated" style="margin-top:5px">&mdash;</div></div>

  </div>

  <div class="tabs">

    <button id="t-pf" class="on" onclick="showTab('pf')">PORTFOLIO</button>

    <button id="t-bv" onclick="showTab('bv')">BOOK VALUE</button>

    <button id="t-ch" onclick="showTab('ch')">CHART</button>

  </div>

  <div id="v-pf" class="view on"><div class="loading">FETCHING MARKET DATA&hellip;</div></div>

  <div id="v-bv" class="view"></div>

  <div id="v-ch" class="view"></div>

  <div class="disc">NOT FINANCIAL ADVICE &middot; VALUES ARE ESTIMATES FROM DAILY SOLD-COMP SNAPSHOTS</div>

</div>

<div id="sheet" class="sheet" onclick="closeCard(event)">

  <div class="sheetcard">

    <button id="sheetclose" class="sheetclose" onclick="closeCard(event)">&times;</button>

    <div id="sheetbody"></div>

  </div>

</div>

<script>

const DOT = String.fromCharCode(183);

const CUR = c => 'C$' + Math.round(c).toLocaleString();

const pct = (n,b) => b ? (n-b)/b*100 : 0;

const fmtPct = p => (p>=0?'+':'') + p.toFixed(p>=100?0:1) + '%';

function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

function fmtDate(s){if(!s)return s;const p=(''+s).split(' ');return p.length<2?s:p[0]+' '+ord(parseInt(p[1],10));}

function fmtHeader(s){if(!s)return s;const p=(''+s).split(' ');return p.length<3?(''+s).toUpperCase():p[0].toUpperCase()+' '+ord(parseInt(p[1],10))+' '+p[2];}

const PALETTE = ['#28f5a8','#b07cff','#ff8a5d','#2a6b54','#ffcb52','#3fe0ff','#ff5d6c'];

const SPARK = {up:'M0,32 L20,30 L40,26 L60,22 L80,15 L100,9 L120,4',flat:'M0,19 L20,21 L40,18 L60,20 L80,18 L100,19 L120,18',down:'M0,12 L20,14 L40,15 L60,18 L80,20 L100,22 L120,24'};

function trend(r){return r>5?'up':r<-5?'down':'flat'}

function badge(r){return r>=100?'HOT':r>5?'UP':r<-5?'RED':'FLAT'}

function hex2rgb(h){const n=parseInt(h.slice(1),16);return [n>>16&255,n>>8&255,n&255]}

function rgba(c,a){return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')'}

function bigName(n){return n.split(DOT)[0].trim()}

function smallName(n){return n.split(DOT).slice(1).join(' '+DOT+' ').trim()}

const TABS=['pf','bv','ch'];

let curTab=0;

function showTab(t){

  curTab=TABS.indexOf(t);

  TABS.forEach(x=>{

    document.getElementById('v-'+x).classList.toggle('on', x===t);

    document.getElementById('t-'+x).classList.toggle('on', x===t);

  });

}

let sx=0,sy=0;

document.addEventListener('touchstart',e=>{_sx=e.changedTouches[0].clientX;_sy=e.changedTouches[0].clientY;},{passive:true});

document.addEventListener('touchend',e=>{

  const dx=e.changedTouches[0].clientX-_sx, dy=e.changedTouches[0].clientY-_sy;

  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){

    if(dx<0 && curTab<TABS.length-1) showTab(TABS[curTab+1]);

    if(dx>0 && curTab>0) showTab(TABS[curTab-1]);

  }

},{passive:true});

let DATA=null;

let CPTS=[];

let MPTS=[];

let CWIN=7;

async function load(){

  try{ DATA = await (await fetch('data.json?t='+Date.now())).json(); }

  catch(e){ document.getElementById('v-pf').innerHTML='<div class="loading">Could not load data.json.</div>'; return; }

  document.getElementById('updated').textContent=fmtHeader(DATA.updated);

  renderPortfolio(DATA); renderBook(DATA); renderChart(DATA);

}

function totals(d){

  const h=d.holdings;

  return {h, now:h.reduce((s,p)=>s+p.now,0), cost:h.reduce((s,p)=>s+p.cost,0), prev:h.reduce((s,p)=>s+(p.prev??p.now),0)};

}

function renderPortfolio(d){

  const {h,now,cost,prev}=totals(d);

  h.forEach((p,i)=>{ if(!p.color) p.color=PALETTE[i%PALETTE.length]; });

  const allTime=pct(now,cost), dayChg=now-prev, dayPct=pct(now,prev);

  let html='<div class="total"><div class="lab">PORTFOLIO VALUE '+DOT+' CAD</div>'

    +'<div class="val"><span class="cur">C$</span><span id="tv">0</span></div>'

    +'<div class="row"><span class="pill '+(allTime>=0?'g':'r')+'">'+(allTime>=0?'\u25B2':'\u25BC')+' '+fmtPct(allTime)+'</span>'

    +'<span class="day" style="font-size:16px;font-weight:700;color:'+(dayChg>0?'var(--green)':dayChg<0?'var(--red)':'var(--mute)')+'">'+(dayChg>=0?'+':'\u2212')+CUR(Math.abs(dayChg))+' today ('+fmtPct(dayPct)+')</span></div>'

    +'<div class="cost">COST BASIS '+CUR(cost)+' '+DOT+' '+h.length+' POSITIONS</div></div>'

    +'<div class="sectionlab"><span>POSITIONS</span><span>COST &rarr; NOW</span></div>';

  h.forEach((p,idx)=>{

    const ret=pct(p.now,p.cost), c=trend(ret), col=p.color, rgb=hex2rgb(col);

    const rc = ret>5?'var(--green)':ret<-5?'var(--red)':'var(--amber)'; const pl = p.now - p.cost;

    html+='<div class="pos" style="cursor:pointer" onclick="openCard('+idx+')"><div class="accent" style="background:'+col+';box-shadow:0 0 14px '+rgba(rgb,.6)+'"></div>'

      +'<div class="glow" style="background:radial-gradient(circle,'+rgba(rgb,.13)+',transparent 70%)"></div>'

      +'<div class="top"><div class="lft"><div class="tkr">'+bigName(p.name)+' <span class="badge" style="color:'+col+';background:'+rgba(rgb,.12)+';border:1px solid '+rgba(rgb,.33)+'">'+badge(ret)+'</span></div>'

      +'<div class="name">'+smallName(p.name)+'</div></div>'

      +'<div class="ret" style="color:'+rc+'">'+fmtPct(ret)+'<span class="x"><span style="font-size:14px;font-weight:700;color:'+(pl>=0?'var(--green)':'var(--red)')+'">'+(pl>=0?'+':'\u2212')+CUR(Math.abs(pl))+'</span> '+DOT+' '+(p.now/p.cost).toFixed(1)+'\u00D7</span></div></div>'

      +'<div class="mid"><div class="spark"><svg viewBox="0 0 120 38" width="100%" height="38" preserveAspectRatio="none"><path d="'+SPARK[c]+'" fill="none" stroke="'+col+'" stroke-width="2.2"/></svg></div>'

      +'<div class="figs"><div class="fig"><div class="k">COST</div><div class="v">'+CUR(p.cost)+'</div></div>'

      +'<div class="fig"><div class="k">NOW</div><div class="v now">'+CUR(p.now)+'</div></div></div></div></div>';

  });

  const sorted=[...h].sort((a,b)=>b.now-a.now);

  html+='<div class="alloc"><div class="k">ALLOCATION BY VALUE</div><div class="bar">';

  sorted.forEach(p=>{ html+='<span style="width:'+(p.now/now*100).toFixed(1)+'%;background:'+p.color+'"></span>'; });

  html+='</div><div class="legend">';

  sorted.forEach(p=>{ html+='<div><span class="sw" style="background:'+p.color+'"></span>'+bigName(p.name)+' '+Math.round(p.now/now*100)+'%</div>'; });

  html+='</div></div>';

  document.getElementById('v-pf').innerHTML=html;

  const el=document.getElementById('tv');let cur=0;

  const step=()=>{cur+=Math.ceil((now-cur)/8);if(cur>=now){el.textContent=Math.round(now).toLocaleString();return}el.textContent=cur.toLocaleString();requestAnimationFrame(step)};

  setTimeout(step,300);

}

function renderBook(d){

  const {h,now,cost}=totals(d);

  const profit=now-cost, ret=pct(now,cost);

  const byRet=[...h].sort((a,b)=>pct(b.now,b.cost)-pct(a.now,a.cost));

  const best=byRet[0], worst=byRet[byRet.length-1];

  let html='<div class="grid2">'

    +'<div class="stat"><div class="k">INVESTED</div><div class="v">'+CUR(cost)+'</div></div>'

    +'<div class="stat"><div class="k">CURRENT VALUE</div><div class="v" style="color:var(--green)">'+CUR(now)+'</div></div>'

    +'<div class="stat"><div class="k">TOTAL PROFIT</div><div class="v" style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+(profit>=0?'+':'\u2212')+CUR(Math.abs(profit))+'</div></div>'

    +'<div class="stat"><div class="k">RETURN</div><div class="v" style="color:'+(ret>=0?'var(--green)':'var(--red)')+'">'+fmtPct(ret)+'</div></div>'

    +'<div class="stat"><div class="k">BEST PERFORMER</div><div class="v sm">'+bigName(best.name)+'</div><div class="k" style="margin-top:6px;color:var(--green)">'+fmtPct(pct(best.now,best.cost))+'</div></div>'

    +'<div class="stat"><div class="k">WORST PERFORMER</div><div class="v sm">'+bigName(worst.name)+'</div><div class="k" style="margin-top:6px;color:'+(pct(worst.now,worst.cost)>=0?'var(--green)':'var(--red)')+'">'+fmtPct(pct(worst.now,worst.cost))+'</div></div>'

    +'</div><div class="sectionlab"><span>PROFIT / LOSS PER CARD</span></div>';

  [...h].sort((a,b)=>(b.now-b.cost)-(a.now-a.cost)).forEach(p=>{

    const pl=p.now-p.cost;

    html+='<div class="pos" style="padding:13px 16px"><div class="top"><div class="lft"><div class="tkr" style="font-size:14px">'+bigName(p.name)+'</div></div>'

      +'<div class="ret" style="font-size:17px;color:'+(pl>=0?'var(--green)':'var(--red)')+'">'+(pl>=0?'+':'\u2212')+CUR(Math.abs(pl))+'</div></div></div>';

  });

  document.getElementById('v-bv').innerHTML=html;

}

function setWin(n){CWIN=n; if(DATA) renderChart(DATA);}

function renderChart(d){

  const {now}=totals(d);

  const histAll=(d.history||[]).slice();

  let hist=histAll;

  if(histAll.length>1 && CWIN<99999){

    const latest=new Date(histAll[histAll.length-1].d).getTime();

    const cutoff=latest-CWIN*86400000;

    const win=histAll.filter(p=>new Date(p.d).getTime()>=cutoff);

    hist = win.length>=2 ? win : histAll.slice(-2);

  }

  const box=document.getElementById('v-ch');

  if(hist.length<2){

    const cur=hist.length?hist[hist.length-1].v:now;

    box.innerHTML='<div class="chartbox"><div class="lab">BOOK VALUE OVER TIME</div>'

      +'<div class="val" style="font-size:40px"><span class="cur">C$</span>'+Math.round(cur).toLocaleString()+'</div>'

      +'<div class="note">Your value history is just getting started. The daily update logs your book value each morning, so this chart fills in over the coming days. Check back in a few days to see the line build.</div></div>';

    return;

  }

  const vals=hist.map(p=>p.v), mn=Math.min(...vals), mx=Math.max(...vals), W=300, H=140, pad=8;

  const span=(mx-mn)||1;

  const xy=hist.map((p,i)=>[pad+i/(hist.length-1)*(W-2*pad), pad+(1-(p.v-mn)/span)*(H-2*pad)]);

  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');

  const area=line+' L'+(W-pad)+','+(H-pad)+' L'+pad+','+(H-pad)+' Z';

  const first=hist[0].v, last=hist[hist.length-1].v, chg=pct(last,first);

  let why='';

  const a=hist[hist.length-2], b=hist[hist.length-1];

  if(a.cards && b.cards){

    const diffs=[];

    Object.keys(b.cards).forEach(n=>{const dl=b.cards[n]-(a.cards[n]!=null?a.cards[n]:b.cards[n]); if(Math.abs(dl)>=1) diffs.push([n,dl]);});

    diffs.sort((x,y)=>Math.abs(y[1])-Math.abs(x[1]));

    const dayChg=b.v-a.v;

    why='<div style="border-top:1px solid var(--line);margin-top:16px;padding-top:14px"><div class="lab">WHAT MOVED &middot; '+fmtDate(a.d)+' &rarr; '+fmtDate(b.d)+'</div>';

    if(diffs.length){

      why+='<div class="row" style="margin:9px 0 2px"><span class="day">Net change</span><span style="font-weight:600;color:'+(dayChg>=0?'var(--green)':'var(--red)')+'">'+(dayChg>=0?'+':'&minus;')+'C$'+Math.abs(dayChg)+'</span></div>';

      diffs.forEach(x=>{const up=x[1]>=0; why+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-top:7px"><span style="color:var(--mute)">'+x[0]+'</span><span style="color:'+(up?'var(--green)':'var(--red)')+'">'+(up?'+':'&minus;')+'C$'+Math.abs(x[1])+'</span></div>';});

    }else{

      why+='<div class="note" style="text-align:left;padding:10px 0 0">No card moved &mdash; everything held steady on the last update.</div>';

    }

    why+='</div>';

  }

  const winLabel = CWIN>=99999?('since '+fmtDate(hist[0].d)) : CWIN===1?'since yesterday' : 'past '+CWIN+' days';

  const WINS=[['1D',1],['7D',7],['30D',30],['ALL',99999]];

  let btns='<div style="display:flex;gap:6px;margin:12px 0 14px">';

  WINS.forEach(w=>{const on=CWIN===w[1]; btns+='<button onclick="setWin('+w[1]+')" style="flex:1;background:'+(on?'linear-gradient(160deg,#10391f,#0a2417)':'var(--panel)')+';border:1px solid '+(on?'rgba(40,245,168,.3)':'var(--line)')+';color:'+(on?'var(--green)':'var(--mute)')+';font-family:inherit;font-weight:600;font-size:10px;letter-spacing:1px;padding:7px 4px;border-radius:7px;cursor:pointer">'+w[0]+'</button>';});

  btns+='</div>';

  box.innerHTML='<div class="chartbox"><div class="lab">BOOK VALUE OVER TIME</div>'

    +'<div class="val" style="font-size:40px"><span class="cur">C$</span>'+Math.round(last).toLocaleString()+'</div>'

    +'<div class="row" style="margin-bottom:14px"><span class="pill '+(chg>=0?'g':'r')+'">'+(chg>=0?'\u25B2':'\u25BC')+' '+fmtPct(chg)+'</span><span class="day">'+winLabel+'</span></div>'+btns

    +'<div id="chartwrap" style="position:relative;touch-action:none"><svg id="chartsvg" viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="none"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(40,245,168,.28)"/><stop offset="1" stop-color="rgba(40,245,168,0)"/></linearGradient></defs>'

    +'<path d="'+area+'" fill="url(#ag)"/><path d="'+line+'" fill="none" stroke="#28f5a8" stroke-width="2.5"/></svg>'

    +'<div id="cguide" style="position:absolute;top:0;bottom:0;width:1px;background:rgba(226,237,242,.45);display:none;pointer-events:none"></div>'

    +'<div id="cdot" style="position:absolute;width:9px;height:9px;border-radius:50%;background:#28f5a8;box-shadow:0 0 8px #28f5a8;display:none;pointer-events:none;transform:translate(-50%,-50%)"></div>'

    +'<div id="ctip" style="position:absolute;top:2px;display:none;pointer-events:none;transform:translateX(-50%);background:#0a1015;border:1px solid var(--line);border-radius:7px;padding:5px 9px;white-space:nowrap;text-align:center;line-height:1.4"></div>'

    +'</div>'+why+'</div>';

  CPTS=hist.map((p,i)=>({d:p.d,v:p.v,fx:xy[i][0]/W,fy:xy[i][1]/H}));

  wireScrub('chartwrap',{svg:'chartsvg',guide:'cguide',dot:'cdot',tip:'ctip'},CPTS);

}

function miniChart(series,col){

  const W=300,H=120,pad=8;

  const vals=series.map(p=>p.v), mn=Math.min(...vals), mx=Math.max(...vals);

  const span=(mx-mn)||1;

  const xy=series.map((p,i)=>[pad+i/(series.length-1)*(W-2*pad), pad+(1-(p.v-mn)/span)*(H-2*pad)]);

  const ln=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');

  const area=ln+' L'+(W-pad)+','+(H-pad)+' L'+pad+','+(H-pad)+' Z';

  const f=series[0].v, l=series[series.length-1].v, chg=pct(l,f), rgb=hex2rgb(col);

  MPTS=series.map((p,i)=>({d:p.d,v:p.v,fx:xy[i][0]/W,fy:xy[i][1]/H,col:col}));

  return '<div class="row" style="margin-bottom:10px"><span class="pill '+(chg>=0?'g':'r')+'">'+(chg>=0?'&#9650;':'&#9660;')+' '+fmtPct(chg)+'</span><span class="day">since '+fmtDate(series[0].d)+'</span></div>'

    +'<div id="mwrap" style="position:relative;touch-action:none"><svg id="msvg" viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="none"><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+rgba(rgb,.30)+'"/><stop offset="1" stop-color="'+rgba(rgb,0)+'"/></linearGradient></defs>'

    +'<path d="'+area+'" fill="url(#cg)"/><path d="'+ln+'" fill="none" stroke="'+col+'" stroke-width="2.5"/></svg>'

    +'<div id="mguide" style="position:absolute;top:0;bottom:0;width:1px;background:rgba(226,237,242,.45);display:none;pointer-events:none"></div>'

    +'<div id="mdot" style="position:absolute;width:9px;height:9px;border-radius:50%;background:'+col+';box-shadow:0 0 8px '+col+';display:none;pointer-events:none;transform:translate(-50%,-50%)"></div>'

    +'<div id="mtip" style="position:absolute;top:2px;display:none;pointer-events:none;transform:translateX(-50%);background:#0a1015;border:1px solid var(--line);border-radius:7px;padding:5px 9px;white-space:nowrap;text-align:center;line-height:1.4"></div>'

    +'</div>';

}

function esc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cardExtras(p){

  var h='';

  if(p.img){

    h+='<div style="margin-top:18px;text-align:center"><img src="'+esc(p.img)+'" alt="" style="max-width:170px;width:58%;border-radius:12px;border:1px solid var(--line);box-shadow:0 12px 34px -14px #000" onerror="this.parentNode.remove()"></div>';

  }

  if(p.listings && p.listings.length){

    h+='<div class="lab" style="margin:22px 0 10px">RECENT SOLD &middot; EBAY</div>';

    p.listings.forEach(function(l){

      h+='<a href="'+esc(l.u||'#')+'" target="_blank" rel="noopener" style="display:flex;gap:11px;align-items:center;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:8px;background:var(--panel)">'

        +(l.img?'<img src="'+esc(l.img)+'" alt="" style="width:44px;height:44px;border-radius:7px;object-fit:cover;flex-shrink:0" onerror="this.remove()">':'')

        +'<span style="flex:1;min-width:0;font-size:10.5px;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(l.t)+'</span>'

        +'<span style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:14px;color:var(--green);white-space:nowrap">C$'+l.p+'</span></a>';

    });

  } else {

    h+='<div class="note" style="margin-top:18px">Recent sold listings will appear here after the next price update.</div>';

  }

  return h;

}

function openCard(idx){

  const p=DATA.holdings[idx]; if(!p) return;

  const name=bigName(p.name), ret=pct(p.now,p.cost), col=p.color;

  const series=(DATA.history||[]).filter(x=>x.cards && x.cards[name]!=null).map(x=>({d:x.d,v:x.cards[name]}));

  const chart = series.length<2

    ? '<div class="note">Price history for this card is still building. Each daily update adds a point, so the trajectory line appears once a couple of days are logged.</div>'

    : miniChart(series,col);

  document.getElementById('sheetbody').innerHTML=

    '<div class="lab">'+smallName(p.name)+'</div>'

    +'<div class="tkr" style="font-size:20px;margin:7px 0 12px;color:'+col+'">'+name+'</div>'

    +'<div class="val" style="font-size:38px"><span class="cur">C$</span>'+Math.round(p.now).toLocaleString()+'</div>'

    +'<div class="row" style="margin:6px 0 18px"><span class="pill '+(ret>=0?'g':'r')+'">'+(ret>=0?'&#9650;':'&#9660;')+' '+fmtPct(ret)+'</span><span class="day">cost C$'+p.cost+' &middot; '+(p.now/p.cost).toFixed(1)+'&times; cost</span></div>'

    +chart+cardExtras(p);

  document.getElementById('sheet').classList.add('on');

  if(series.length>=2) wireScrub('mwrap',{svg:'msvg',guide:'mguide',dot:'mdot',tip:'mtip'},MPTS);

}

function closeCard(e){

  if(!e || e.target.id==='sheet' || e.target.id==='sheetclose') document.getElementById('sheet').classList.remove('on');

}

function scrubAt(clientX,ids,pts){

  if(!pts||!pts.length) return;

  const svg=document.getElementById(ids.svg); if(!svg) return;

  const r=svg.getBoundingClientRect(); if(!r.width) return;

  let f=(clientX-r.left)/r.width; f=f<0?0:f>1?1:f;

  let best=pts[0],bd=2;

  pts.forEach(p=>{const dd=Math.abs(p.fx-f); if(dd<bd){bd=dd;best=p;}});

  const L=best.fx*100;

  const g=document.getElementById(ids.guide),dt=document.getElementById(ids.dot),tp=document.getElementById(ids.tip);

  if(!g||!dt||!tp) return;

  g.style.left=L+'%'; g.style.display='block';

  dt.style.left=L+'%'; dt.style.top=(best.fy*100)+'%'; dt.style.display='block';

  tp.style.left=(L<12?12:L>88?88:L)+'%'; tp.style.display='block';

  tp.innerHTML='<b style="color:'+(best.col||'var(--green)')+'">C$'+Math.round(best.v).toLocaleString()+'</b><br><span style="color:var(--mute);font-size:9px">'+fmtDate(best.d)+'</span>';

}

function hideScrubIds(ids){[ids.guide,ids.dot,ids.tip].forEach(id=>{const e=document.getElementById(id); if(e) e.style.display='none';});}

function wireScrub(wrapId,ids,pts){

  const cw=document.getElementById(wrapId); if(!cw) return;

  const mv=e=>{const t=e.touches?e.touches[0]:e; scrubAt(t.clientX,ids,pts); e.stopPropagation(); if(e.cancelable)e.preventDefault();};

  cw.addEventListener('touchstart',mv,{passive:false});

  cw.addEventListener('touchmove',mv,{passive:false});

  cw.addEventListener('touchend',e=>{hideScrubIds(ids); e.stopPropagation();});

  cw.addEventListener('mousemove',mv);

  cw.addEventListener('mouseleave',()=>hideScrubIds(ids));

}

load();

</script>
